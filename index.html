<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SurfaceMap – podrobná mapa povrchů cest</title>
    <meta name="description" content="Rozšířená mapa povrchů cest z OpenStreetMap – asfalt, beton, dlažba, hlína, dřevo, kámen a další s možností filtrování.">
    <meta name="keywords" content="OpenStreetMap, Overpass, povrchy cest, asfalt, dlažba, cyklomapa, turistická mapa, filtr povrchů">
    <meta name="author" content="SurfaceMap">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="controls">
        <div class="panel-header">
            <h3>🧭 SurfaceMap</h3>
            <button id="toggleFilters" class="icon-button" title="Rozbalit filtry">⚙️</button>
        </div>
        
        <div class="control-item">
            <label>
                <input type="checkbox" id="autoLoad" checked> Automaticky načítat
            </label>
        </div>
        
        <div class="control-item">
            <button id="loadButton" class="primary-button">📥 Načíst data nyní</button>
        </div>

        <!-- Filtry (rozbalovací) -->
        <div id="filtersPanel" class="filters-panel hidden">
            <h4>Filtry povrchů</h4>
            <div id="filtersContainer"></div>
            <div class="filter-actions">
                <button id="selectAllBtn">Vybrat vše</button>
                <button id="deselectAllBtn">Odznačit vše</button>
            </div>
        </div>

        <!-- Statistiky -->
        <div id="stats" class="stats">
            <span id="totalWays">0</span> cest celkem,
            <span id="visibleWays">0</span> zobrazeno
        </div>

        <!-- Informační panely -->
        <div id="warning" class="warning hidden">
            ⚠️ Pro zobrazení povrchů přibližte mapu (zoom 14+)
        </div>
        <div id="loading" class="loading hidden">Načítám data...</div>
        <div id="error" class="error hidden"></div>

    <!-- Legenda (rozšířená) -->
        <div id="legend">
            <div class="legend-header" id="legendToggle">
                <span>📋 Legenda</span>
                <span class="legend-arrow">▼</span>
            </div>
            <div id="legendContent" class="legend-content">
                <div class="legend-item" data-category="asfalt">
                    <span class="color-dot" style="background:#2c3e50;"></span>
                    <span>asfalt</span>
                    <span class="legend-count" id="count-asfalt">0</span>
                </div>
                <div class="legend-item" data-category="beton">
                    <span class="color-dot" style="background:#7f8c8d;"></span>
                    <span>beton</span>
                    <span class="legend-count" id="count-beton">0</span>
                </div>
                <div class="legend-item" data-category="dlazba">
                    <span class="color-dot" style="background:#f39c12;"></span>
                    <span>dlažba</span>
                    <span class="legend-count" id="count-dlazba">0</span>
                </div>
                <div class="legend-item" data-category="hilna">
                    <span class="color-dot" style="background:#8B4513;"></span>
                    <span>hlína</span>
                    <span class="legend-count" id="count-hilna">0</span>
                </div>
                <div class="legend-item" data-category="sterk">
                    <span class="color-dot" style="background:#b87333;"></span>
                    <span>štěrk</span>
                    <span class="legend-count" id="count-sterk">0</span>
                </div>
                <div class="legend-item" data-category="drevo">
                    <span class="color-dot" style="background:#27ae60;"></span>
                    <span>dřevo</span>
                    <span class="legend-count" id="count-drevo">0</span>
                </div>
                <div class="legend-item" data-category="kamen">
                    <span class="color-dot" style="background:#95a5a6;"></span>
                    <span>kámen</span>
                    <span class="legend-count" id="count-kamen">0</span>
                </div>
                <div class="legend-item" data-category="piasek">
                    <span class="color-dot" style="background:#f4e9d9;"></span>
                    <span>písek</span>
                    <span class="legend-count" id="count-piasek">0</span>
                </div>
                <div class="legend-item" data-category="umele">
                    <span class="color-dot" style="background:#9b59b6;"></span>
                    <span>umělé</span>
                    <span class="legend-count" id="count-umele">0</span>
                </div>
                <div class="legend-item" data-category="travni">
                    <span class="color-dot" style="background:#7cfc00;"></span>
                    <span>travnaté</span>
                    <span class="legend-count" id="count-travni">0</span>
                </div>
                <div class="legend-item" data-category="bez">
                    <span class="color-dot no-surface"></span>
                    <span>bez povrchu</span>
                    <span class="legend-count" id="count-bez">0</span>
                </div>
                <div class="legend-item" data-category="ostatni">
                    <span class="color-dot" style="background:#9b59b6;"></span>
                    <span>ostatní</span>
                    <span class="legend-count" id="count-ostatni">0</span>
                </div>
            </div>
        </div>

        <!-- Odkazy -->
        <div class="links-panel">
            <a href="https://codeberg.org/osmcz/SurfaceMap" target="_blank" title="Zdrojový kód">🔗 GitHub</a>
            <a href="https://openstreetmap.org/" id="osmLink" title="Otevřít v OSM">🗺️ OSM</a>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
